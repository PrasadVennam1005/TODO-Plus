name: Build & Verify Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew test

      - name: Verify Plugin Compatibility
        run: ./gradlew verifyPlugin -x buildSearchableOptions

      - name: Build Distribution Plugin Package
        run: ./gradlew buildPlugin -x buildSearchableOptions

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TODO-Plus-Plugin-Package
          path: build/distributions/*.zip
